<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEARNING DOM MANIPULATION</title>
</head>
<body style="background-color: rgb(1, 14, 1); color: antiquewhite;"> 
    <ul class="language">
        <li>JAVASCRIPT</li>
    </ul>
</body>
<script>
    function add_language(lang_name)
    {
        const li=document.createElement('li');
        li.innerHTML=`${lang_name}`; // using the direct HTML insertion traverses the complete DOM tree unnecessarily 
        document.querySelector('.language').appendChild(li);
    }
    add_language("PYTHON");
    add_language("C++");
    add_language("SOLIDITY");
    function optimised_add(lang_name)
    {
        const li=document.createElement('li');
        li.appendChild(document.createTextNode(lang_name));// Parsing is avoided and directly appended
        document.querySelector('.language').appendChild(li);
    }
    optimised_add('GOLANG'); 
    //EDIT
    const third_lang= document.querySelector("li:nth-child(3)");
    third_lang.innerHTML="Ruby";
    const new_li=document.createElement('li');
    new_li.textContent="BHAVYA";
    third_lang.replaceWith(new_li); 
    //REMOVE 
    const last_lang=document.querySelector('li:last-child')
    last_lang.remove();
</script>
</html>
