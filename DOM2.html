<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEARNING DOM MANIPULATION</title>
</head>
<body style="background-color: green; color: antiquewhite;"> </body>
<script>
    const div=document.createElement('div');
    console.log(div);
    div.className="main"
    div.id= Math.round(Math.random()*10 +1);//randoms id generation
    div.setAttribute("title","generated title")
    div.style.padding="12px"
    div.style.backgroundColor="black";
    div.style.textAlign="center";
    // div.innerText="RANDOM TEXT HEY!" usually not preferred
    const add_text=document.createTextNode("RANDOM TEXT HEY!")
    div.appendChild(add_text)
    document.body.appendChild(div);    
</script>
</html>
