<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEARNING DOM MANIPULATION</title>
</head>
<body style="background-color: black; color: antiquewhite;"> </body>
<script>
    const parent=document.querySelector('.parent') // .parent means class parent
    console.log(parent);
    console.log(parent.children);// .children gives array like functionality
    console.log(parent.children[2].innerHTML);
    for(let i=0;i<parent.children.length;i++)
     console.log(parent.children[i].innerHTML);
     parent.children[2].style.color="red";
     parent.children[2].style.background="yellow";// You can target an element and style it as you want 
     const day_one=document.querySelector('.day');
     console.log(day_one.parentElement);// Since day_one is the children we can get its Parent
     console.log(day_one);
     console.log(day_one.parentElement);
     console.log("NODES: ",parent.childNodes);

     const boring_day=document.querySelector('#Boring');
     boring_day.style.padding="12px";
     boring_day.style.background="red";
</script>
</html>
